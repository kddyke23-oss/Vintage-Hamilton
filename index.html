<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lotto Syndicate - Powerball Tracker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎱</text></svg>">
<style>
  :root { --primary: #2c5f2d; --accent: #c9a94e; --bg: #f5f1eb; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: #2d2d2d; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
  .card { background: white; border-radius: 16px; padding: 3rem; box-shadow: 0 4px 24px rgba(0,0,0,0.1); max-width: 520px; width: 90%; text-align: center; }
  h1 { color: var(--primary); font-size: 1.6rem; margin-bottom: 0.5rem; }
  .subtitle { color: var(--accent); font-size: 0.95rem; margin-bottom: 2rem; }
  p { color: #555; line-height: 1.7; margin-bottom: 1.5rem; font-size: 1.05rem; }
  a.btn { display: inline-block; background: linear-gradient(135deg, #1a3d1b, var(--primary)); color: white; text-decoration: none; padding: 0.8rem 2rem; border-radius: 8px; font-weight: 600; font-size: 1rem; transition: transform 0.2s, box-shadow 0.2s; }
  a.btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(44,95,45,0.3); }
</style>
</head>
<body>
  <div class="card">
    <h1>Vintage at Hamilton</h1>
    <p class="subtitle">Lotto Syndicate Tracker</p>
    <p>This application has moved to the full community portal.</p>
    <a href="https://www.vintageathamilton.com" class="btn">Visit www.vintageathamilton.com</a>
  </div>
</body>
</html>
